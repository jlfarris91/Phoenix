name: Build (Windows)

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      upload_artifact:
        required: false
        default: false
        type: boolean
      artifact_name:
        required: false
        default: PhoenixSim-windows
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: .vcpkg-binary-cache
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-windows-

      - name: Create vcpkg binary cache dir
        run: mkdir -p .vcpkg-binary-cache
        shell: bash

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache

      - name: Configure
        run: cmake --preset windows-ci

      - name: Build
        run: cmake --build .build/windows-ci --config Release --parallel

      - name: Test
        run: ctest --test-dir .build/windows-ci --build-config Release --output-on-failure

      - name: Install
        if: inputs.upload_artifact
        run: |
          cmake --install .build/windows-ci --config Release --prefix .artifact
          Copy-Item "README.md"    .artifact -ErrorAction SilentlyContinue
          Copy-Item "CHANGELOG.md" .artifact -ErrorAction SilentlyContinue
          Copy-Item "docs"         .artifact -Recurse

      - name: Upload artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: .artifact/
          if-no-files-found: error
