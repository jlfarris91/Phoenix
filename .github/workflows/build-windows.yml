name: Build (Windows)

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      upload_artifact:
        required: false
        default: false
        type: boolean
      artifact_name:
        required: false
        default: PhoenixSim-windows
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: .vcpkg-binary-cache
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-windows-

      - name: Create vcpkg binary cache dir
        run: mkdir -p .vcpkg-binary-cache
        shell: bash

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache sccache store
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-windows-${{ github.run_id }}
          restore-keys: sccache-windows-

      - name: Configure
        run: cmake --preset windows-ci -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_C_COMPILER_LAUNCHER=sccache
        env:
          SCCACHE_GHA_ENABLED: "false"
          SCCACHE_DIR: ${{ github.workspace }}/.sccache

      - name: Build
        run: cmake --build .build/windows-ci --parallel
        env:
          SCCACHE_GHA_ENABLED: "false"
          SCCACHE_DIR: ${{ github.workspace }}/.sccache

      - name: Test
        run: ctest --test-dir .build/windows-ci --output-on-failure

      - name: Install
        if: inputs.upload_artifact
        run: |
          cmake --install .build/windows-ci --prefix .artifact
          Copy-Item "README.md"    .artifact -ErrorAction SilentlyContinue
          Copy-Item "CHANGELOG.md" .artifact -ErrorAction SilentlyContinue
          Copy-Item "docs"         .artifact -Recurse

      - name: Upload artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: .artifact/
          if-no-files-found: error
