name: Build (Windows)

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      upload_artifact:
        required: false
        default: false
        type: boolean
      artifact_name:
        required: false
        default: PhoenixSim-windows
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-windows-

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"

      - name: Configure
        run: cmake --preset windows -A x64 -T host=x64

      - name: Build
        run: cmake --build --preset Release --parallel

      - name: Install
        if: inputs.upload_artifact
        run: |
          cmake --install .build/windows --config Release --prefix .artifact/windows
          Copy-Item "LICENSE"      .artifact/windows -ErrorAction SilentlyContinue
          Copy-Item "README.md"    .artifact/windows -ErrorAction SilentlyContinue
          Copy-Item "CHANGELOG.md" .artifact/windows -ErrorAction SilentlyContinue

      - name: Upload artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: .artifact/windows/
          if-no-files-found: error
