name: Build (Linux)

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      upload_artifact:
        required: false
        default: false
        type: boolean
      artifact_name:
        required: false
        default: PhoenixSim-linux
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: sudo apt-get install -y ninja-build

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: .vcpkg-binary-cache
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-linux-

      - name: Create vcpkg binary cache dir
        run: mkdir -p .vcpkg-binary-cache

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache sccache store
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-linux-${{ github.run_id }}
          restore-keys: sccache-linux-

      - name: Configure
        run: cmake --preset linux-ci -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_C_COMPILER_LAUNCHER=sccache
        env:
          SCCACHE_GHA_ENABLED: "false"
          SCCACHE_DIR: ${{ github.workspace }}/.sccache

      - name: Build
        run: cmake --build .build/linux-ci --parallel
        env:
          SCCACHE_GHA_ENABLED: "false"
          SCCACHE_DIR: ${{ github.workspace }}/.sccache

      - name: Test
        run: ctest --test-dir .build/linux-ci --output-on-failure

      - name: Install
        if: inputs.upload_artifact
        run: |
          cmake --install .build/linux-ci --prefix .artifact
          cp README.md    .artifact/ 2>/dev/null || true
          cp CHANGELOG.md .artifact/ 2>/dev/null || true
          cp -r docs      .artifact/

      - name: Upload artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: .artifact/
          if-no-files-found: error
