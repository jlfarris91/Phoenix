name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: steps.release.outputs.release_created

      - name: Tag major and minor versions
        if: steps.release.outputs.release_created
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -d v${{ steps.release.outputs.major }} || true
          git tag -d v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }} || true
          git push origin :v${{ steps.release.outputs.major }} || true
          git push origin :v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }} || true
          git tag -a v${{ steps.release.outputs.major }} -m "Release v${{ steps.release.outputs.major }}"
          git tag -a v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }} -m "Release v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}"
          git push origin v${{ steps.release.outputs.major }}
          git push origin v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}

  build-windows:
    needs: release-please
    uses: ./.github/workflows/build-windows.yml
    with:
      upload_artifact: ${{ needs.release-please.outputs.release_created == 'true' }}
      artifact_name: PhoenixSim-windows
    secrets: inherit

  build-emscripten:
    needs: release-please
    uses: ./.github/workflows/build-emscripten.yml
    with:
      upload_artifact: ${{ needs.release-please.outputs.release_created == 'true' }}
      artifact_name: PhoenixSim-wasm
    secrets: inherit

  attach-release-assets:
    needs: [release-please, build-windows, build-emscripten]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PhoenixSim-windows
          path: release-assets/windows

      - name: Download Emscripten artifact
        uses: actions/download-artifact@v4
        with:
          name: PhoenixSim-wasm
          path: release-assets/wasm

      - name: Create zip archives
        run: |
          cd release-assets
          zip -r PhoenixSim-${{ needs.release-please.outputs.tag_name }}-windows.zip windows/
          zip -r PhoenixSim-${{ needs.release-please.outputs.tag_name }}-wasm.zip wasm/

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            release-assets/PhoenixSim-${{ needs.release-please.outputs.tag_name }}-windows.zip
            release-assets/PhoenixSim-${{ needs.release-please.outputs.tag_name }}-wasm.zip
