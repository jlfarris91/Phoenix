name: Build

permissions:
  contents: read
  packages: read
  actions: write

on:
  workflow_call:
    inputs:
      preset:
        required: false
        default: ci
        type: string
      config:
        required: false
        default: ReleaseCI
        type: string
      generate_artifact:
        required: false
        default: false
        type: boolean
      artifact_dir:
        required: false
        default: .artifact
        type: string
 
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        config: [ReleaseCI]
    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true # Ensure vcpkg directory is actually populated

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          # 'clear' removes defaults, 'nuget' points to the source we just added
          VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
      
      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Configure CMake
        shell: pwsh
        run: cmake --preset ${{ inputs.preset }}

      - name: Build CMake targets
        shell: pwsh
        run: cmake --build --preset ${{ inputs.config }}

      # TODO: figure out how to determine the buildDir by the configurePreset. For now assume it's always .build_ci.
      - name: Install
        shell: pwsh
        run: cmake --install "$env:GITHUB_WORKSPACE/.build_ci/" --config ${{ inputs.config }} --prefix "$env:GITHUB_WORKSPACE/${{ inputs.artifact_dir }}"

      - name: Bundle Artifact
        if: inputs.generate_artifact == true
        shell: pwsh
        run: |
          $artifactDir = "$env:GITHUB_WORKSPACE/${{ inputs.artifact_dir }}"
          $docsDir = "$env:GITHUB_WORKSPACE/docs"
          Copy-Item "LICENSE" $artifactDir -ErrorAction SilentlyContinue
          Copy-Item "README.md" $artifactDir -ErrorAction SilentlyContinue
          Copy-Item "CHANGELOG.md" $artifactDir -ErrorAction SilentlyContinue
          Copy-Item $docsDir $artifactDir -Recurse -Force -ErrorAction SilentlyContinue

      - name: Upload artifact
        if: inputs.generate_artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixSim-${{ github.sha }}.zip
          path: $env:GITHUB_WORKSPACE/${{ inputs.artifact_dir }}/*
