name: Build

permissions:
  packages: write
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
 
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        config: [CI]
    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true # Ensure vcpkg directory is actually populated

      - name: Configure NuGet for vcpkg
        shell: bash
        run: |
          # Fetch the NuGet executable provided by vcpkg
          NUGET_EXE=$(./vcpkg/vcpkg fetch nuget | tail -n 1)
          # Add your GitHub Packages feed as a source
          $NUGET_EXE sources add \
            -Name "GitHub" \
            -Source "https://nuget.pkg.github.com{{ github.repository_owner }}/index.json" \
            -UserName "${{ github.repository_owner }}" \
            -Password "${{ secrets.GITHUB_TOKEN }}" \
            -StorePasswordInClearText

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          # 'clear' removes defaults, 'nuget' points to the source we just added
          VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
      
      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Build and Install
        shell: pwsh
        run: ./build/build.ps1 -Preset ci -Config ${{ matrix.config }}

      - name: Get version
        if: github.event_name == 'release'
        id: get_version
        shell: pwsh
        run: |
          $manifest = Get-Content release-please-manifest.json | ConvertFrom-Json
          $version = $manifest.version
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Package Artifact
        if: github.event_name == 'release'
        shell: pwsh
        run: |
          Compress-Archive -Path ".artifact/${{ matrix.config }}" -DestinationPath "PhoenixSim-${{ steps.get_version.outputs.version }}.zip"
          Write-Host "Artifact created: PhoenixSim-${{ steps.get_version.outputs.version }}.zip"

      - name: Upload artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixSim-${{ steps.get_version.outputs.version }}.zip
          path: ./PhoenixSim-${{ steps.get_version.outputs.version }}.zip

      - name: Create GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: PhoenixSim-${{ steps.get_version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
